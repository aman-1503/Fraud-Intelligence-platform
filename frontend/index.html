<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fraud Intelligence Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: rgb(30, 41, 59); border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: rgb(71, 85, 105); border-radius: 4px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Stat Card Component
    function StatCard({ label, value, icon, color, highlight }) {
      const colorClasses = {
        blue: 'from-blue-500/20 to-blue-600/5 border-blue-500/30 text-blue-400',
        red: 'from-red-500/20 to-red-600/5 border-red-500/30 text-red-400',
        amber: 'from-amber-500/20 to-amber-600/5 border-amber-500/30 text-amber-400',
        emerald: 'from-emerald-500/20 to-emerald-600/5 border-emerald-500/30 text-emerald-400',
        purple: 'from-purple-500/20 to-purple-600/5 border-purple-500/30 text-purple-400',
      };

      return (
        <div className={`bg-gradient-to-br ${colorClasses[color]} rounded-xl border p-4 ${highlight ? 'ring-2 ring-emerald-500/50' : ''}`}>
          <div className="flex items-center justify-between mb-2">
            <span className="text-slate-400 text-sm">{label}</span>
            <span className="text-lg">{icon}</span>
          </div>
          <p className="text-2xl font-bold text-white">{value}</p>
        </div>
      );
    }

    // Transaction Row Component
    function TransactionRow({ transaction }) {
      const getDecisionStyle = (decision) => {
        switch (decision) {
          case 'APPROVE': return 'bg-emerald-500/20 text-emerald-400';
          case 'REVIEW': return 'bg-amber-500/20 text-amber-400';
          case 'DECLINE': return 'bg-red-500/20 text-red-400';
          default: return 'bg-slate-500/20 text-slate-400';
        }
      };

      const getScoreColor = (score) => {
        if (score < 0.3) return 'text-emerald-400';
        if (score < 0.6) return 'text-amber-400';
        return 'text-red-400';
      };

      return (
        <tr className="hover:bg-slate-800/50 transition-colors border-b border-slate-800">
          <td className="px-4 py-3 font-mono text-sm text-slate-300">{transaction.id}</td>
          <td className="px-4 py-3 text-sm text-slate-300">{transaction.userId}</td>
          <td className="px-4 py-3 font-mono text-slate-300">${transaction.amount.toFixed(2)}</td>
          <td className="px-4 py-3 text-sm capitalize text-slate-300">{transaction.category.replace('_', ' ')}</td>
          <td className={`px-4 py-3 font-mono ${getScoreColor(transaction.score)}`}>
            {transaction.score.toFixed(3)}
          </td>
          <td className="px-4 py-3">
            <span className={`px-2 py-1 rounded-full text-xs font-medium ${getDecisionStyle(transaction.decision)}`}>
              {transaction.decision}
            </span>
          </td>
          <td className="px-4 py-3 text-sm text-slate-400">{transaction.latency}ms</td>
        </tr>
      );
    }

    // Alert Card Component
    function AlertCard({ alert }) {
      const isHighRisk = alert.type === 'high_risk';
      return (
        <div className={`${isHighRisk ? 'bg-red-500/10 border-red-500/30' : 'bg-amber-500/10 border-amber-500/30'} border rounded-lg p-3`}>
          <div className="flex items-start gap-2">
            <span className={`text-lg ${isHighRisk ? 'text-red-400' : 'text-amber-400'}`}>⚠️</span>
            <div className="flex-1 min-w-0">
              <p className="text-sm text-slate-200">{alert.message}</p>
              <p className="text-xs text-slate-500 mt-1">
                {new Date(alert.timestamp).toLocaleTimeString()} • {alert.transactionId}
              </p>
            </div>
          </div>
        </div>
      );
    }

    // Generate transaction helper
    function generateTransaction() {
      const categories = ['grocery', 'gas_station', 'restaurant', 'online_retail', 'electronics', 'travel', 'crypto_exchange'];
      const score = Math.random();
      let decision = 'APPROVE';
      if (score > 0.85) decision = 'DECLINE';
      else if (score > 0.6) decision = 'REVIEW';

      return {
        id: `TXN-${Math.random().toString(36).substr(2, 8).toUpperCase()}`,
        userId: `U${Math.floor(Math.random() * 10000).toString().padStart(6, '0')}`,
        amount: Math.random() * 2000 + 10,
        category: categories[Math.floor(Math.random() * categories.length)],
        score: score,
        decision: decision,
        latency: Math.floor(20 + Math.random() * 60),
        timestamp: new Date().toISOString(),
      };
    }

    // Main Dashboard Component
    function FraudDashboard() {
      const [stats, setStats] = useState({
        totalTransactions: 1247893,
        fraudDetected: 3124,
        fraudRate: 2.5,
        avgLatency: 42,
        throughput: 3150,
      });
      
      const [recentTransactions, setRecentTransactions] = useState([]);
      const [alerts, setAlerts] = useState([]);
      const [isLive, setIsLive] = useState(true);

      // Initialize with sample data
      useEffect(() => {
        setRecentTransactions(Array(15).fill(null).map(() => generateTransaction()));
      }, []);

      // Simulate real-time updates
      useEffect(() => {
        if (!isLive) return;
        
        const interval = setInterval(() => {
          setStats(prev => ({
            totalTransactions: prev.totalTransactions + Math.floor(Math.random() * 50),
            fraudDetected: prev.fraudDetected + (Math.random() > 0.97 ? 1 : 0),
            fraudRate: 2.3 + (Math.random() - 0.5) * 0.4,
            avgLatency: 35 + Math.random() * 20,
            throughput: 2800 + Math.random() * 500,
          }));
          
          const newTxn = generateTransaction();
          setRecentTransactions(prev => [newTxn, ...prev.slice(0, 14)]);
          
          if (Math.random() > 0.92) {
            setAlerts(prev => [{
              id: Date.now(),
              type: Math.random() > 0.5 ? 'high_risk' : 'velocity',
              message: Math.random() > 0.5 
                ? 'High-risk transaction detected from new device'
                : 'Unusual velocity pattern detected for user',
              timestamp: new Date().toISOString(),
              transactionId: newTxn.id,
            }, ...prev.slice(0, 4)]);
          }
        }, 1500);
        
        return () => clearInterval(interval);
      }, [isLive]);

      return (
        <div className="min-h-screen bg-slate-950 text-slate-100">
          {/* Header */}
          <header className="border-b border-slate-800 bg-slate-900/80 backdrop-blur-sm sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="p-2 bg-gradient-to-br from-emerald-500 to-cyan-500 rounded-xl">
                    <span className="text-xl">🛡️</span>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">
                      Fraud Intelligence Platform
                    </h1>
                    <p className="text-xs text-slate-500">Real-time fraud detection & analytics</p>
                  </div>
                </div>
                
                <div className="flex items-center gap-4">
                  <div className="flex items-center gap-2 text-sm">
                    <span className={`w-2 h-2 rounded-full ${isLive ? 'bg-emerald-500 animate-pulse' : 'bg-slate-500'}`} />
                    <span className="text-slate-400">{isLive ? 'Live' : 'Paused'}</span>
                  </div>
                  
                  <button
                    onClick={() => setIsLive(!isLive)}
                    className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-colors ${
                      isLive ? 'bg-emerald-500/20 text-emerald-400 hover:bg-emerald-500/30' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'
                    }`}
                  >
                    {isLive ? '⏸ Pause' : '▶ Resume'}
                  </button>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-8">
            {/* Stats Grid */}
            <div className="grid grid-cols-5 gap-4 mb-8">
              <StatCard label="Total Transactions" value={stats.totalTransactions.toLocaleString()} icon="📊" color="blue" />
              <StatCard label="Fraud Detected" value={stats.fraudDetected.toLocaleString()} icon="⚠️" color="red" />
              <StatCard label="Fraud Rate" value={`${stats.fraudRate.toFixed(2)}%`} icon="📈" color="amber" />
              <StatCard label="Avg Latency" value={`${stats.avgLatency.toFixed(0)}ms`} icon="⚡" color="emerald" highlight={stats.avgLatency < 50} />
              <StatCard label="Throughput" value={`${stats.throughput.toFixed(0)} RPS`} icon="🚀" color="purple" highlight={stats.throughput > 3000} />
            </div>

            {/* Main Content */}
            <div className="grid grid-cols-3 gap-6">
              {/* Transactions Table */}
              <div className="col-span-2 bg-slate-900/50 rounded-2xl border border-slate-800 overflow-hidden">
                <div className="p-4 border-b border-slate-800 flex items-center justify-between">
                  <h2 className="font-semibold text-lg">Recent Transactions</h2>
                  <span className="text-xs text-slate-500">Updated in real-time</span>
                </div>
                
                <div className="overflow-x-auto">
                  <table className="w-full">
                    <thead>
                      <tr className="text-left text-xs text-slate-500 uppercase tracking-wider bg-slate-800/50">
                        <th className="px-4 py-3">Transaction ID</th>
                        <th className="px-4 py-3">User</th>
                        <th className="px-4 py-3">Amount</th>
                        <th className="px-4 py-3">Category</th>
                        <th className="px-4 py-3">Score</th>
                        <th className="px-4 py-3">Decision</th>
                        <th className="px-4 py-3">Latency</th>
                      </tr>
                    </thead>
                    <tbody>
                      {recentTransactions.map((txn) => (
                        <TransactionRow key={txn.id} transaction={txn} />
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Alerts Panel */}
              <div className="bg-slate-900/50 rounded-2xl border border-slate-800 overflow-hidden">
                <div className="p-4 border-b border-slate-800">
                  <h2 className="font-semibold flex items-center gap-2">
                    <span>🚨</span>
                    Active Alerts
                    <span className="ml-auto bg-red-500/20 text-red-400 px-2 py-0.5 rounded-full text-xs">
                      {alerts.length}
                    </span>
                  </h2>
                </div>
                
                <div className="p-4 space-y-3 max-h-80 overflow-y-auto">
                  {alerts.length === 0 ? (
                    <div className="text-center py-8 text-slate-500">
                      <span className="text-3xl mb-2 block">✅</span>
                      <p className="text-sm">No active alerts</p>
                    </div>
                  ) : (
                    alerts.map((alert) => (
                      <AlertCard key={alert.id} alert={alert} />
                    ))
                  )}
                </div>
              </div>
            </div>

            {/* Model Info */}
            <div className="mt-6 grid grid-cols-3 gap-4">
              <div className="bg-slate-900/50 rounded-xl border border-slate-800 p-4">
                <h3 className="text-sm text-slate-400 mb-2">Model Version</h3>
                <p className="text-lg font-mono text-white">v1.0.0 (XGBoost)</p>
                <p className="text-xs text-slate-500 mt-1">ROC-AUC: 0.989</p>
              </div>
              <div className="bg-slate-900/50 rounded-xl border border-slate-800 p-4">
                <h3 className="text-sm text-slate-400 mb-2">Model Performance</h3>
                <p className="text-lg font-mono text-white">Precision: 94.2%</p>
                <p className="text-xs text-slate-500 mt-1">Recall: 89.7% | F1: 91.9%</p>
              </div>
              <div className="bg-slate-900/50 rounded-xl border border-slate-800 p-4">
                <h3 className="text-sm text-slate-400 mb-2">System Status</h3>
                <div className="flex items-center gap-2">
                  <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse" />
                  <p className="text-lg text-white">All Systems Operational</p>
                </div>
                <p className="text-xs text-slate-500 mt-1">Uptime: 99.97% (30d)</p>
              </div>
            </div>
          </main>
        </div>
      );
    }

    // Render the app
    ReactDOM.createRoot(document.getElementById('root')).render(<FraudDashboard />);
  </script>
</body>
</html>
