# Fraud Intelligence Platform - Docker Compose
# Complete stack for local development and testing

version: '3.8'

services:
  # ==========================================
  # API Backend Service
  # ==========================================
  api:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: fraud-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/fraud_platform
      - REDIS_URL=redis://redis:6379/0
      - MODEL_PATH=/app/models/fraud_model_v1
      - LOG_LEVEL=INFO
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ml/models:/app/models:ro
    networks:
      - fraud-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: fraud-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=fraud_platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - fraud-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fraud_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ==========================================
  # Redis Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: fraud-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - fraud-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ==========================================
  # Frontend (Development)
  # ==========================================
  frontend:
    image: node:20-alpine
    container_name: fraud-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - fraud-network
    depends_on:
      - api

  # ==========================================
  # Prometheus Monitoring
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: fraud-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - fraud-network

  # ==========================================
  # Grafana Dashboards
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: fraud-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - fraud-network
    depends_on:
      - prometheus

  # ==========================================
  # Load Testing (Locust)
  # ==========================================
  locust:
    image: locustio/locust:latest
    container_name: fraud-locust
    ports:
      - "8089:8089"
    volumes:
      - ./load-tests:/mnt/locust:ro
    command: -f /mnt/locust/locustfile.py --host=http://api:8000
    networks:
      - fraud-network
    depends_on:
      - api
    profiles:
      - testing

# ==========================================
# Networks
# ==========================================
networks:
  fraud-network:
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
